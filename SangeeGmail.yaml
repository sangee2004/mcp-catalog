name: SangeeGmail
entryKey: sangee-gmail
shortDescription: Send, read, draft, and organize Gmail emails with label management and search
description: |
  ![Gmail MCP Server](https://img.shields.io/badge/Gmail-MCP%20Server-blue?style=for-the-badge&logo=gmail)
  ![Python](https://img.shields.io/badge/Python-3.13+-green?style=for-the-badge&logo=python)
  ![FastMCP](https://img.shields.io/badge/FastMCP-2.11.1+-orange?style=for-the-badge)
  ![License](https://img.shields.io/badge/License-MIT-yellow?style=for-the-badge)

  A Model Context Protocol (MCP) server for Gmail integration, providing comprehensive email management capabilities through a modern API interface.

  ## Features
  - **OAuth2 Authentication**: Secure Google OAuth integration with automatic token refresh
  - **Complete Email Management**: Read, send, draft, and organize emails with advanced filtering
  - **Label Management**: Create, update, and manage Gmail labels and organization
  - **Advanced Search**: Powerful query-based email filtering and search capabilities
  - **Attachment Support**: List and manage email attachments
  - **Draft Management**: Create, update, send, and delete draft emails

  ## What you'll need to connect

  **No Setup Required**: Authentication is handled automatically through OAuth2 workflow

metadata:
  categories: Business
  allow-multiple: "true"
icon: https://img.icons8.com/?size=100&id=P7UIlhbpWzZm&format=png&color=000000
runtime: remote
startupTimeoutSeconds: 100
remoteConfig:
  fixedURL: https://gmail-mcp.obot.ai/mcp
resources:
  requests:
    memory: 150Mi
