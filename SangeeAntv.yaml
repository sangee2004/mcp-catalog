name: Sangee AntV Charts
shortDescription: Generate 25+ professional chart types for data visualization and analysis .Use ${VAR} fo testing. 
description: |
  ![MCP Server](https://badge.mcpx.dev?type=server) [![build](https://github.com/antvis/mcp-server-chart/actions/workflows/build.yml/badge.svg)](https://github.com/antvis/mcp-server-chart/actions/workflows/build.yml) [![npm Version](https://img.shields.io/npm/v/@antv/mcp-server-chart.svg)](https://www.npmjs.com/package/@antv/mcp-server-chart) [![npm License](https://img.shields.io/npm/l/@antv/mcp-server-chart.svg)](https://www.npmjs.com/package/@antv/mcp-server-chart)

  A Model Context Protocol (MCP) server for generating charts using AntV. Create various types of professional charts for data analysis and visualization with support for 25+ chart types including statistical, geographical, and specialized diagrams.

  ## Features
  # Now 25+ charts supported:

  - **Statistical Charts**: Area, bar, column, line, pie, scatter, histogram, boxplot, violin charts
  - **Advanced Visualizations**: Radar, funnel, Sankey, treemap, dual-axes, liquid charts
  - **Text & Data**: Word cloud charts for frequency analysis
  - **Relationship Diagrams**: Venn diagrams, network graphs, organization charts
  - **Process & Analysis**: Mind maps, fishbone diagrams, flow diagrams
  - **Geographic Maps**: District maps, pin maps, path maps (China region support via AMap)

  > **Note:** Geographic visualization charts use AMap service and currently only support map generation within China.

  ## What you'll need to connect

  This connector works out-of-the-box with no required configuration. All parameters are optional:

  - **VIS_REQUEST_SERVER** (Optional): Custom chart generation service URL for private deployment, example: `https://antv-studio.alipay.com/api/gpt-vis`
  - **SERVICE_ID** (Optional): Service identifier for chart generation records, example: `your-service-id-123`
  - **DISABLED_TOOLS** (Optional): Comma-separated list of tool names to disable, example: `generate_fishbone_diagram,generate_mind_map`

  ### Private Deployment

  `MCP Server Chart` provides a free chart generation service by default. For users with a need for private deployment, they can try using `VIS_REQUEST_SERVER` to customize their own chart generation service.
  You can use AntV's project [GPT-Vis-SSR](https://github.com/antvis/GPT-Vis/tree/main/bindings/gpt-vis-ssr) to deploy an HTTP service in a private environment, and then pass the URL address through configuration option `VIS_REQUEST_SERVER`.

  - **Method**: `POST`
  - **Parameter**: Which will be passed to `GPT-Vis-SSR` for rendering. Such as, `{ "type": "line", "data": [{ "time": "2025-05", "value": 512 }, { "\
  time": "2025-06", "value": 1024 }] }`.
  - **Return**: The return object of HTTP service.
  - **success**: `boolean` Whether generate chart image successfully.
  - **resultObj**: `string` The chart image url.
  - **errorMessage**: `string` When `success = false`, return the error message.

  > [!NOTE]
  > The private deployment solution currently does not support geographic visualization chart generation include 3 tools: `generate_district_map`, `generate_path_map`, `generate_pin_map`.

  ### Generate Records

  By default, users are required to save the results themselves, but we also provide a service for viewing the chart generation records, which requires users to generate a service identifier for themselves and configure it.
  Use Alipay to scan and open the mini program to generate a personal service identifier (click the "My" menu below, enter the "My Services" page, click the "Generate" button, and click the "Copy" button after success):

  <img alt="my service identifier website" width="240" src="https://mdn.alipayobjects.com/huamei_dxq8v0/afts/img/dASoTLt6EywAAAAARqAAAAgADu43AQFr/fmt.webp" />

  You need to set proper value of `SERVICE_ID` to the MCP server configuration.

metadata:
  categories: Data & Analytics
icon: https://avatars.githubusercontent.com/u/19199542?v=4
env:
- key: VIS_REQUEST_SERVER
  name: Vis Request Server
  required: false
  sensitive: false
  description: Custom chart generation service URL for private deployment, e.g., from GPT-Vis-SSR.
- key: DISABLED_TOOLS
  name: Disabled Tools
  required: false
  sensitive: false
  description: Comma-separated list of tool names to disable
- key: SERVICE_ID
  name: Service ID
  required: false
  sensitive: false
  description: Service identifier for chart generation records
runtime: containerized
containerizedConfig:
  image: ghcr.io/obot-platform/mcp-images/antv-charts:0.9.4
  port: 8099
  path: /
  args:
  - mcp-server-chart
  startupTimeoutSeconds: 100
  egressDomains: ["testing.com","*.sangeetesting.com"]
